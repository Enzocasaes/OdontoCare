app = "odontocare-api"
primary_region = "gru"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "data"
  destination = "/app/uploads"

[[vm]]
  cpuKind = "performance"
  cpus = 1
  memoryMb = 512
